# SonarCloud Automatic Analysis configuration.
#
# Test files exercise the same functions with structurally similar input
# shapes (fixture arrays, arrange blocks, repeated expect() patterns) that
# CPD classifies as duplication regardless of semantic intent. Production
# code under src/** has 0% duplication; the gate was only catching test
# shape, not code health.
#
# This exclusion applies to Copy-Paste Detection only — every other Sonar
# rule (bugs, code smells, security hotspots, coverage) still runs on
# test files.
sonar.cpd.exclusions=test/**/*
